<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

<h2>🔔 Notifications</h2>

{% for n in data %}
    <div class="box">
        {{ n['message'] }}
    </div>
{% endfor %}

<br>

<a href="/explore">⬅ Back to Explore</a>

</body>
</html>
