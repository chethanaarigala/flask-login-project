<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
            transition: 0.3s;
        }

        /* DARK MODE */
        body.dark {
            background: #1a1a1a;
            color: white;
        }

        body.dark .card {
            background: #2c2c2c;
            color: white;
        }

        body.dark .navbar {
            background: #111;
        }

        body.dark .dropdown-content {
            background: #2c2c2c;
        }

        body.dark .dropdown-content a {
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #667eea;
            color: white;
            padding: 12px 20px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-right a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* DARK BUTTON */
        .dark-btn {
            cursor: pointer;
            background: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* PROFILE IMAGE */
        .nav-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            cursor: pointer;
        }

        /* DROPDOWN */
        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 60px;
            background: white;
            min-width: 200px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
            z-index: 9999;
        }

        .dropdown-content p {
            padding: 12px;
            margin: 0;
            font-weight: bold;
            background: #f7f7f7;
        }

        .dropdown-content a {
            display: block;
            padding: 12px;
            text-decoration: none;
            color: #333;
        }

        .dropdown-content a:hover {
            background: #f1f1f1;
        }

        /* CONTENT */
        .content {
            padding: 30px;
        }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0;
            color: #667eea;
        }

        body.dark .card h3 {
            color: #8ab4ff;
        }

        .card p {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>MyApp 🚀</h2>

    <div class="nav-right">
        <a href="/explore">Explore</a>

        <!-- DARK MODE BUTTON -->
        <button class="dark-btn" onclick="toggleDark()">🌙</button>

        <!-- PROFILE DROPDOWN -->
        <div class="dropdown">
            <img class="nav-img"
                 onclick="toggleMenu()"
                 src="{{ url_for('static', filename='uploads/' + (profile_pic or 'default.png')) }}">

            <div id="dropdownMenu" class="dropdown-content">
                <p>{{ user }}</p>

                <a href="/profile">👤 Profile</a>
                <a href="/explore">🚀 Explore</a>
                <a href="/settings">⚙️ Settings</a>
                <a href="/logout">🚪 Logout</a>
            </div>
        </div>
    </div>
</div>

<!-- CONTENT -->
<div class="content">
    <h1>Welcome, {{ user }} 👋</h1>

    <div class="cards">

        <div class="card" onclick="go('/profile')">
            <h3>👤 Profile</h3>
            <p>View and update your profile</p>
        </div>

        <div class="card" onclick="go('/explore')">
            <h3>🚀 Explore</h3>
            <p>Discover new features</p>
        </div>

        <div class="card" onclick="go('/settings')">
            <h3>⚙️ Settings</h3>
            <p>Manage your preferences</p>
        </div>

        <div class="card" onclick="go('/logout')">
            <h3>🚪 Logout</h3>
            <p>Securely logout</p>
        </div>

    </div>
</div>

<!-- JAVASCRIPT -->
<script>
function go(url) {
    window.location.href = url;
}

// DROPDOWN
function toggleMenu() {
    var menu = document.getElementById("dropdownMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// CLOSE DROPDOWN
window.onclick = function(event) {
    if (!event.target.matches('.nav-img')) {
        var dropdown = document.getElementById("dropdownMenu");
        if (dropdown) dropdown.style.display = "none";
    }
}

// DARK MODE
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

// LOAD THEME
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
}
</script>

</body>
</html>
