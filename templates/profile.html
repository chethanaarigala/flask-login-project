<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .profile-box {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #667eea;
        }

        h3 {
            color: #667eea;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            width: 100%;
        }

        .back-btn {
            margin-top: 10px;
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="profile-box">

    <h2>👤 Profile</h2>

    <!-- PROFILE IMAGE -->
    <img src="{{ url_for('static', filename='uploads/' + (user['profile_pic'] or 'default.png')) }}">

    <h3>{{ user['mobile'] }}</h3>

    <!-- UPLOAD FORM -->
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="profile_pic" required>
        <button type="submit">Upload New Photo</button>
    </form>

    <br>

    <a href="/home" class="back-btn">⬅ Back to Home</a>

</div>

</body>
</html>
