<!DOCTYPE html>
<html>
<head>
    <title>Explore</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            background: #667eea;
            color: white;
            padding: 12px 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        /* POST CARD */
        .post {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .post:hover {
            transform: scale(1.03);
        }

        .post img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .post-content {
            padding: 10px;
        }

        .like {
            cursor: pointer;
            color: red;
            font-size: 18px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Explore 🌍</h2>
    <a href="/home">Back</a>
</div>

<!-- POSTS GRID -->
<div class="grid">

    <div class="post">
        <img src="https://picsum.photos/300/200">
        <div class="post-content">
            <p>Beautiful Nature 🌿</p>
            <span class="like" onclick="like(this)">❤️</span>
        </div>
    </div>

    <div class="post">
        <img src="https://picsum.photos/301/200">
        <div class="post-content">
            <p>Travel Vibes ✈️</p>
            <span class="like" onclick="like(this)">❤️</span>
        </div>
    </div>

    <div class="post">
        <img src="https://picsum.photos/302/200">
        <div class="post-content">
            <p>City Lights 🌆</p>
            <span class="like" onclick="like(this)">❤️</span>
        </div>
    </div>

    <div class="post">
        <img src="https://picsum.photos/303/200">
        <div class="post-content">
            <p>Food Love 🍔</p>
            <span class="like" onclick="like(this)">❤️</span>
        </div>
    </div>

</div>

<script>
function like(el) {
    if (el.style.color === "gray") {
        el.style.color = "red";
    } else {
        el.style.color = "gray";
    }
}
</script>

</body>
</html>
